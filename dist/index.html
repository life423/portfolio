<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>drewclark.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />
    <link rel="stylesheet" href="./assets/css/main.min.css" />
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <script defer src="./assets/js/main.min.js"></script>
  </head>

  <body class="body">
    <div class="container">
      <header class="header primary-heading">
        <nav class="nav">
          <div class="nav__logo">
            <h1 class="nav__header">DC</h1>
          </div>
          <div class="nav__toggler">
            <!-- Hamburger icon -->
            <div class="nav__icon nav__icon--bars">&#9776;</div>

            <!-- Close icon -->
            <div class="nav__icon nav__icon--times">&times;</div>
          </div>
          <ul class="nav__list">
            <li class="nav__item">
              <a href="#" rel="noopener noreferrer">Home</a>
            </li>
            <li class="nav__item">
              <a href="#" rel="noopener noreferrer">About</a>
            </li>
            <li class="nav__item">
              <a href="#" rel="noopener noreferrer">Services</a>
            </li>
            <li class="nav__item">
              <a href="#" rel="noopener noreferrer">Contact</a>
            </li>
          </ul>
        </nav>
      </header>

      <main class="main">
        <section class="card">
          <article class="card__tile">
            <div class="card__tile__front">
              <div
                class="card__tile__front--image-1"
                aria-label="Project Image"
              ></div>
              <h2 class="card__heading-1 secondary-heading">
                <span class="card-heading-span--1"
                  >Unpack</span
                >
                <span class="card-heading-span--2"
                  >Cipher Complexity</span
                >
              </h2>
              <h3 class="card__subheading">
                <span class="card__subheading--1">Polymorphic Cipher</span>
                <span class="card__subheading--2">Cryptography Redefined</span>
              </h3>
              <p class="card__subtitle">
                More than just dedication - a testament to the skills mastered
                and problems solved in the field of cryptography.
              </p>
            </div>
            <div class="card__tile__back">
              <!-- Back content goes here. -->
            </div>
          </article>
          <article class="card__tile">
            <div class="card__tile__front">
              <!-- Front content goes here. -->
            </div>
            <div class="card__tile__back">
              <!-- Back content goes here. -->
            </div>
          </article>
          <article class="card__tile">
            <div class="card__tile__front">
              <!-- Front content goes here. -->
            </div>
            <div class="card__tile__back">
              <!-- Back content goes here. -->
            </div>
          </article>
          <article class="card__tile">
            <div class="card__tile__front">
              <!-- Front content goes here. -->
            </div>
            <div class="card__tile__back">
              <!-- Back content goes here. -->
            </div>
          </article>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__social">
          <a
            href="https://twitter.com/WebDevAIAndrew"
            class="footer__social-link"
            alt="Twitter"
          >
            <i class="fab fa-twitter footer__social--icon"></i>
          </a>
          <a
            href="https://github.com/life423"
            class="footer__social-link"
            alt="github"
          >
            <i class="fab fa-github footer__social--icon"></i>
          </a>
        </div>
        <div class="footer__copyright">
          <p class="footer__text">Andrew Clark</p>
          <p class="footer__text">
            <span class="footer__copyright--symbol">&copy;</span>2023
          </p>
        </div>
      </footer>
